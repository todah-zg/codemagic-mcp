startCommand:
  type: stdio
  configSchema:
    properties:
      CODEMAGIC_API_TOKEN:
        type: string
        description: "Your Codemagic API token. Found in Codemagic → User settings → Integrations."
      ASC_KEY_ID:
        type: string
        description: "App Store Connect API key ID (required for iOS tools)"
      ASC_ISSUER_ID:
        type: string
        description: "App Store Connect issuer ID (required for iOS tools)"
      ASC_PRIVATE_KEY_B64:
        type: string
        description: "Base64-encoded .p8 private key: base64 -i AuthKey_XXXX.p8 (required for iOS tools)"
      ASC_BYPASS_KEYCHAIN:
        type: string
        description: "Set to '1' to use env var auth instead of the macOS keychain"
        default: "1"
      GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS:
        type: string
        description: "Raw JSON of your Google Play service account key, or @file:/path/to/key.json (required for Android tools)"
    required:
      - CODEMAGIC_API_TOKEN
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "codemagic-mcp-server"],
      env: Object.fromEntries(Object.entries(config).filter(([, v]) => v !== undefined && v !== ""))
    })
